name: "Prismatic Integration Publisher"
description: "Import and publish an integration via Prismatic's Prism CLI"
branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  INTEGRATION_ID:
    description: "The ID of the integration to be published."
    required: true
  PATH_TO_YML:
    description: "Path to the YAML file containing the integration configuration."
    required: false
  PATH_TO_CNI:
    description: "The path to the Code Native Integration source code, usually the same location as the CNI's package.json. If not provided, the root will be used."
    required: false
  PRISMATIC_URL:
    description: "The target Prismatic API to import to."
    required: true
  PRISM_REFRESH_TOKEN:
    description: "The token granting access to the API at the PRISMATIC_URL provided."
    required: true
  PRISMATIC_TENANT_ID:
    description: "The tenant ID to use when publishing the integration. Required if your user is associated with multiple tenants in a single region. Use 'prism me' to find your tenant ID."
    required: false
  CUSTOMER_ID:
    description: "Optional customer ID to associate with the published version."
    required: false
  SKIP_COMMIT_HASH_PUBLISH:
    description: "Skip inclusion of commit hash in metadata."
    required: false
    default: "false"
  SKIP_COMMIT_URL_PUBLISH:
    description: "Skip inclusion of commit url in metadata."
    required: false
    default: "false"
  SKIP_REPO_URL_PUBLISH:
    description: "Skip inclusion of repository url in metadata."
    required: false
    default: "false"
  SKIP_PULL_REQUEST_URL_PUBLISH:
    description: "Skip inclusion of pull request url in metadata."
    required: false
    default: "false"
  MAKE_AVAILABLE_IN_MARKETPLACE:
    description: "Make version available in the marketplace."
    required: false
    default: "false"
  OVERVIEW:
    description: "Overview to describe the purpose of the integration."
    required: false
    default: ""
  COMMENT:
    description: "A comment to include with the published version."
    required: false
    default: ""
  PRISM_VERSION:
    description: "The version of the Prism CLI to install. Defaults to ^9."
    required: false
    default: "^9"
  TEST_API_KEYS:
    description: |
      Test API keys to associate with flows for test executions. A YAML
      mapping of flow name to API key, passed as a `|` block scalar
      (GitHub Actions inputs are string-typed; the `|` delivers the map
      as a literal multi-line string for the action to parse). See README
      for the full pattern. Flow names with spaces are supported.
      Neither side may contain a literal `"`. Pass via secrets — do not
      hard-code.
    required: false
    default: ""

outputs:
  PUBLISHED_INTEGRATION_VERSION_ID:
    description: "The ID of the just-published integration version."
    value: ${{ steps.publish-integration.outputs.PUBLISHED_INTEGRATION_VERSION_ID }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      run: ${{ github.action_path }}/scripts/validate-inputs.sh
      env:
        PRISMATIC_URL: ${{ inputs.PRISMATIC_URL }}
        PRISM_REFRESH_TOKEN: ${{ inputs.PRISM_REFRESH_TOKEN }}
        INTEGRATION_ID: ${{ inputs.INTEGRATION_ID }}
        PATH_TO_YML: ${{ inputs.PATH_TO_YML }}
        PATH_TO_CNI: ${{ inputs.PATH_TO_CNI }}

    - name: Resolve commit and PR details
      id: scm
      shell: bash
      run: ${{ github.action_path }}/scripts/scm-details.sh
      env:
        REPO: ${{ github.repository }}
        SHA: ${{ github.sha }}
        GH_TOKEN: ${{ github.token }}

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: "22"

    - name: Install Prism
      shell: bash
      run: ${{ github.action_path }}/scripts/install-prism.sh
      env:
        PRISM_VERSION: ${{ inputs.PRISM_VERSION }}

    - name: Import Integration
      shell: bash
      run: ${{ github.action_path }}/scripts/import.sh
      env:
        PRISMATIC_URL: ${{ inputs.PRISMATIC_URL }}
        PRISM_REFRESH_TOKEN: ${{ inputs.PRISM_REFRESH_TOKEN }}
        PRISMATIC_TENANT_ID: ${{ inputs.PRISMATIC_TENANT_ID }}
        INTEGRATION_ID: ${{ inputs.INTEGRATION_ID }}
        PATH_TO_YML: ${{ inputs.PATH_TO_YML }}
        PATH_TO_CNI: ${{ inputs.PATH_TO_CNI }}
        TEST_API_KEYS: ${{ inputs.TEST_API_KEYS }}

    - name: Publish Integration
      id: publish-integration
      shell: bash
      run: ${{ github.action_path }}/scripts/publish.sh
      env:
        PRISMATIC_URL: ${{ inputs.PRISMATIC_URL }}
        PRISM_REFRESH_TOKEN: ${{ inputs.PRISM_REFRESH_TOKEN }}
        PRISMATIC_TENANT_ID: ${{ inputs.PRISMATIC_TENANT_ID }}
        INTEGRATION_ID: ${{ inputs.INTEGRATION_ID }}
        PATH_TO_CNI: ${{ inputs.PATH_TO_CNI }}
        REPO: ${{ github.repository }}
        COMMIT_HASH: ${{ steps.scm.outputs.COMMIT_HASH }}
        COMMIT_URL: ${{ steps.scm.outputs.COMMIT_URL }}
        PR_URL: ${{ steps.scm.outputs.PR_URL }}
        CUSTOMER_ID: ${{ inputs.CUSTOMER_ID }}
        COMMENT: ${{ inputs.COMMENT }}
        SKIP_COMMIT_HASH_PUBLISH: ${{ inputs.SKIP_COMMIT_HASH_PUBLISH }}
        SKIP_COMMIT_URL_PUBLISH: ${{ inputs.SKIP_COMMIT_URL_PUBLISH }}
        SKIP_REPO_URL_PUBLISH: ${{ inputs.SKIP_REPO_URL_PUBLISH }}
        SKIP_PULL_REQUEST_URL_PUBLISH: ${{ inputs.SKIP_PULL_REQUEST_URL_PUBLISH }}

    - name: Make available in marketplace
      id: marketplace-available
      if: ${{ inputs.MAKE_AVAILABLE_IN_MARKETPLACE == 'true' }}
      shell: bash
      run: ${{ github.action_path }}/scripts/marketplace.sh
      env:
        PRISMATIC_URL: ${{ inputs.PRISMATIC_URL }}
        PRISM_REFRESH_TOKEN: ${{ inputs.PRISM_REFRESH_TOKEN }}
        PRISMATIC_TENANT_ID: ${{ inputs.PRISMATIC_TENANT_ID }}
        VERSION_ID: ${{ steps.publish-integration.outputs.PUBLISHED_INTEGRATION_VERSION_ID }}
        OVERVIEW: ${{ inputs.OVERVIEW }}

    - name: Summary
      shell: bash
      run: ${{ github.action_path }}/scripts/summary.sh
      env:
        INTEGRATION_ID: ${{ inputs.INTEGRATION_ID }}
        VERSION_ID: ${{ steps.publish-integration.outputs.PUBLISHED_INTEGRATION_VERSION_ID }}
        PRISMATIC_URL: ${{ inputs.PRISMATIC_URL }}
        PRISMATIC_TENANT_ID: ${{ inputs.PRISMATIC_TENANT_ID }}
        PATH_TO_YML: ${{ inputs.PATH_TO_YML }}
        PATH_TO_CNI: ${{ inputs.PATH_TO_CNI }}
        COMMIT_URL: ${{ steps.scm.outputs.COMMIT_URL }}
        PR_URL: ${{ steps.scm.outputs.PR_URL }}
        SKIP_COMMIT_HASH_PUBLISH: ${{ inputs.SKIP_COMMIT_HASH_PUBLISH }}
        SKIP_COMMIT_URL_PUBLISH: ${{ inputs.SKIP_COMMIT_URL_PUBLISH }}
        SKIP_REPO_URL_PUBLISH: ${{ inputs.SKIP_REPO_URL_PUBLISH }}
        SKIP_PULL_REQUEST_URL_PUBLISH: ${{ inputs.SKIP_PULL_REQUEST_URL_PUBLISH }}
        MAKE_AVAILABLE_IN_MARKETPLACE: ${{ inputs.MAKE_AVAILABLE_IN_MARKETPLACE }}
        MARKETPLACE_EXIT_CODE: ${{ steps.marketplace-available.outputs.EXIT_CODE }}
